services:
  greenmail:
    image: greenmail/standalone:2.1.0
    container_name: greenmail
    ports:
      # SMTP
      - "3025:3025"
      # IMAP
      - "3143:3143"
      # Greenmail API (mapped to 8081 to avoid conflict with Meecrowave)
      - "8081:8080"
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.auth.disabled -Dgreenmail.users=test@imagey.cloud:password

  meecrowave:
    image: maven:3.9-eclipse-temurin-17
    container_name: meecrowave
    volumes:
      - .:/app
      - ~/.m2:/root/.m2 # Reuse local m2 repository to prevent downloading dependencies each startup
    working_dir: /app/imagey-server
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    ports:
      - "8080:8080"
    # Remove MAVEN_OPTS to avoid docker string quoting issues and pass arguments directly via Maven command
    command: mvn meecrowave:run -Droot.path=target/data -Dacme-challenge.path=target/acme-challenge -Dauthentication.secret=eXkLrmpPYd11aQVgCkCGmKF8XtfpfZv02mUDPNjREcxSjcz/ZtX/u6NZbcaZhWQ3zjEbzb1dUSKVvcfjzNp45Q== -Dsmtp.host=greenmail -Dsmtp.port=3025 -Dsmtp.user=test@imagey.cloud -Dsmtp.password=password
    depends_on:
      - greenmail
