services:
  greenmail:
    image: greenmail/standalone:2.1.0
    ports:
      # SMTP
      - "${SMTP_PORT:-3025}:3025"
      # IMAP
      - "${IMAP_PORT:-3143}:3143"
      # Greenmail API (mapped to 8081 to avoid conflict with Meecrowave)
      - "${GREENMAIL_API_PORT:-8081}:8080"
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.auth.disabled -Dgreenmail.users=test@imagey.cloud:password

  meecrowave:
    build: .
    ports:
      - "${MEECROWAVE_PORT:-8080}:8080"
    environment:
      - MEECROWAVE_OPTS=-Droot.path=data -Dacme-challenge.path=target/acme-challenge -Dauthentication.secret=eXkLrmpPYd11aQVgCkCGmKF8XtfpfZv02mUDPNjREcxSjcz/ZtX/u6NZbcaZhWQ3zjEbzb1dUSKVvcfjzNp45Q== -Dsmtp.host=greenmail -Dsmtp.port=3025 -Dsmtp.user=test@imagey.cloud -Dsmtp.password=password -Dsecure-doc.urls=https://secure-doc.store,https://imagey.cloud,http://localhost:8080
    depends_on:
      - greenmail
    volumes:
      - ./imagey-server/src/test/resources/data:/app/data
